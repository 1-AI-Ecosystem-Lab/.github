<rect width="1500" height="800" fill="#FDFDFC"/>
<text x="70" y="62" font-family="SFMono-Regular, Consolas, 'Liberation Mono', monospace" font-size="13" letter-spacing="3" fill="#6C5CE7">ARQUITETURA COGNITIVA OPERACIONAL</text>
<text x="70" y="102" font-size="32" font-weight="700" fill="#12172B">Da IHM à IHIAM</text>
<text x="70" y="132" font-size="16" fill="#5B6478">A IA deixa de mediar comandos e passa a participar da decisão e do aprendizado</text>
