<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900">
<defs>
<linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
<stop offset="0%" stop-color="#06101f"/><stop offset="100%" stop-color="#101827"/>
</linearGradient>
<filter id="shadow"><feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#000" flood-opacity=".35"/></filter>
<marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
<path d="M2,2 L10,6 L2,10 Z" fill="#38bdf8"/></marker>
<style>
.bg{fill:url(#bg)} .title{font-family:Arial,sans-serif;font-size:46px;font-weight:800;fill:#f8fafc}
.sub{font-family:Arial,sans-serif;font-size:22px;fill:#cbd5e1}
.h{font-family:Arial,sans-serif;font-size:23px;font-weight:800;fill:#e2e8f0}
.t{font-family:Arial,sans-serif;font-size:21px;font-weight:700;fill:#f8fafc}
.s{font-family:Arial,sans-serif;font-size:17px;fill:#cbd5e1}
.xs{font-family:Arial,sans-serif;font-size:14px;fill:#94a3b8}
.card{fill:#111c31;stroke:#334155;stroke-width:1.5;filter:url(#shadow)}
.blue{fill:#0f2342;stroke:#38bdf8;stroke-width:2.2;filter:url(#shadow)}
.green{fill:#10251d;stroke:#34d399;stroke-width:2.2;filter:url(#shadow)}
.purple{fill:#1c1838;stroke:#a78bfa;stroke-width:2.2;filter:url(#shadow)}
.orange{fill:#2a1b0b;stroke:#f59e0b;stroke-width:2.2;filter:url(#shadow)}
.red{fill:#2a1016;stroke:#fb7185;stroke-width:2.2;filter:url(#shadow)}
.line{stroke:#38bdf8;stroke-width:3;fill:none;marker-end:url(#arrow)}
.muted{stroke:#94a3b8;stroke-width:2.2;fill:none;marker-end:url(#arrow);opacity:.8}
.chip{fill:#0b1220;stroke:#475569;stroke-width:1}
.chipt{font-family:Arial,sans-serif;font-size:15px;fill:#cbd5e1}
</style>
</defs>
<rect class="bg" width="1600" height="900"/><circle cx="1430" cy="110" r="250" fill="#1d4ed8" opacity=".12"/><circle cx="180" cy="790" r="270" fill="#7c3aed" opacity=".10"/><text x="80" y="78" class="title">Arquitetura Operacional Cognitiva</text><text x="80" y="126" class="sub">Inferência, decisão, conhecimento, governança e operação como um sistema integrado</text></svg>