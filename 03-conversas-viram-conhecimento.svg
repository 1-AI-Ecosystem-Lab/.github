.red{fill:#2a1016;stroke:#fb7185;stroke-width:2.2;filter:url(#shadow)}
.line{stroke:#38bdf8;stroke-width:3;fill:none;marker-end:url(#arrow)}
.muted{stroke:#94a3b8;stroke-width:2.2;fill:none;marker-end:url(#arrow);opacity:.8}
.chip{fill:#0b1220;stroke:#475569;stroke-width:1}
.chipt{font-family:Arial,sans-serif;font-size:15px;fill:#cbd5e1}
</style>
</defs>
<rect class="bg" width="1600" height="900"/><circle cx="1430" cy="110" r="250" fill="#1d4ed8" opacity=".12"/><circle cx="180" cy="790" r="270" fill="#7c3aed" opacity=".10"/><text x="80" y="78" class="title">Como Conversas Viram Conhecimento</text><text x="80" y="126" class="sub">Da interação efêmera à memória cognitiva governada</text><rect x="80" y="230" width="300" height="110" rx="22" class="blue"/><text x="104" y="272" class="t">Conversation</text><text x="104" y="302" class="s">interação humana ou agente</text><line x1="385" y1="285" x2="450" y2="285" class="line"/><rect x="460" y="230" width="300" height="110" rx="22" class="green"/><text x="484" y="272" class="t">Session Capture</text><text x="484" y="302" class="s">registro da sessão</text><line x1="765" y1="285" x2="830" y2="285" class="line"/><rect x="840" y="230" width="300" height="110" rx="22" class="purple"/><text x="864" y="272" class="t">Evidence Extraction</text><text x="864" y="302" class="s">decisões, fatos, artefatos</text><line x1="1145" y1="285" x2="1210" y2="285" class="line"/><rect x="1220" y="230" width="300" height="110" rx="22" class="orange"/><text x="1244" y="272" class="t">Quality Evaluation</text><text x="1244" y="302" class="s">confiança e utilidade</text><path d="M1370,350 C1370,400 1200,400 1200,460" class="line"/><rect x="80" y="470" width="300" height="110" rx="22" class="blue"/><text x="104" y="512" class="t">Provenance Graph</text><text x="104" y="542" class="s">origem, relações, contexto</text><line x1="385" y1="525" x2="450" y2="525" class="line"/><rect x="460" y="470" width="300" height="110" rx="22" class="green"/><text x="484" y="512" class="t">Conflict Detection</text><text x="484" y="542" class="s">contradições e obsolescência</text><line x1="765" y1="525" x2="830" y2="525" class="line"/><rect x="840" y="470" width="300" height="110" rx="22" class="purple"/><text x="864" y="512" class="t">Consolidation</text><text x="864" y="542" class="s">padrões e sínteses</text><line x1="1145" y1="525" x2="1210" y2="525" class="line"/><rect x="1220" y="470" width="300" height="110" rx="22" class="orange"/><text x="1244" y="512" class="t">Distribution</text><text x="1244" y="542" class="s">skills · prompts · references</text><rect x="200" y="745" width="1200" height="70" rx="28" fill="#0b1220" stroke="#38bdf8" stroke-width="2"/><text x="300" y="790" class="h">Chat → memória episódica → consolidação → memória semântica → distribuição cross-agent</text></svg>